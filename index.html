<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Widget Financeiro</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="card">
            <h2 class="card_title">SALDO ATUAL</h2>

            <div class="balanco_container">
                <h1 classe="sensitive-data" data-value="R$ 2.550,00">R$ 2.550,00</h1>
                <button class="btn" id="toggleBtn" title="Ocultar Saldo">👁️</button>
            </div>

            <div class="details-container">
                <div class="box input-box">
                    <div class = "icon">↑</div>
                    <div class="text">
                        <span class="label">Entradas</span>
                        <span class="value sensitive-data" data-value="+ R$ 1.200,00">+ R$ 1.200,00</span>
                    </div>
                </div>

                <div class="box exit-box">
                    <div class = "icon">↓</div>
                    <div class="text">
                        <span class="label">Saídas</span>
                        <span class="value sensitive-data" data-value="- R$ 850,00">- R$ 850,00</span>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>

</html>
